name: Access request
description: Request repository or team access.
title: "[access] "
labels: ["governance", "needs-review"]
body:
  - type: input
    id: requester
    attributes:
      label: Requester
      placeholder: "@github-username"
    validations:
      required: true
  - type: input
    id: repository
    attributes:
      label: Repository
      placeholder: "Heptapus-Open-Code-Organization/repository"
    validations:
      required: true
  - type: dropdown
    id: permission
    attributes:
      label: Requested permission
      options:
        - triage
        - write
        - maintain
        - admin
        - organization membership only
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why is this access needed?
    validations:
      required: true
  - type: input
    id: duration
    attributes:
      label: Expected duration
      placeholder: "ongoing / until YYYY-MM-DD / until issue #..."
    validations:
      required: true
  - type: checkboxes
    id: agreements
    attributes:
      label: Agreements
      options:
        - label: This request follows least-privilege access.
          required: true
        - label: I understand access may be removed when no longer needed.
          required: true
