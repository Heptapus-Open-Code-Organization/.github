name: Community request
description: Ask a general organization-level question or request a community/process improvement.
title: "[community] "
labels: ["community", "needs-review"]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What would you like to ask, suggest, or improve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Community process
        - Documentation
        - Governance
        - Contribution workflow
        - Labels / issues
        - Security policy
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add any relevant links, examples, or constraints.
    validations:
      required: false
